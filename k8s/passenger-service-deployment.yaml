apiVersion: apps/v1
kind: Deployment
metadata:
  name: passenger-service
  namespace: intercity237
  labels:
    app: passenger-service
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: passenger-service
  template:
    metadata:
      labels:
        app: passenger-service
        version: v1
    spec:
      containers:
      - name: passenger-service
        image: ghcr.io/intercity237/passenger-service:latest
        ports:
        - containerPort: 80
        envFrom:
        - secretRef:
            name: intercity237-db-secret
        env:
        - name: RABBITMQ_HOST
          value: rabbitmq
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /index.php
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /index.php
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: passenger-service
  namespace: intercity237
spec:
  selector:
    app: passenger-service
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
