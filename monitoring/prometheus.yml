global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'intercity237'

rule_files: []

scrape_configs:

  # Node Exporter — métriques système (CPU, RAM, Disk, Network)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'intercity237-vps'

  # RabbitMQ — métriques message broker
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']

  # API Gateway — health endpoint Nginx
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:80']
    metrics_path: '/health'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
